version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ev_battery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ev_battery
      POSTGRES_USER: ev_admin
      POSTGRES_PASSWORD: ev_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ev_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@evbattery.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
